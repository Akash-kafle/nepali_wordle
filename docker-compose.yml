services:

  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: nwg-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${DB_NAME:-nepali_word_game}
      MYSQL_USER:          ${DB_USER:-nwg_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-nwg_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "3306:3306"  # expose for local DB tools (remove in production)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nwg-internal

  # ---- Node.js Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nwg-backend
    restart: unless-stopped
    environment:
      NODE_ENV:       ${NODE_ENV:-development}
      PORT:           3000
      DB_HOST:        mysql
      DB_PORT:        3306
      DB_USER:        ${DB_USER:-nwg_user}
      DB_PASSWORD:    ${DB_PASSWORD:-nwg_pass}
      DB_NAME:        ${DB_NAME:-nepali_word_game}
      JWT_SECRET:     ${JWT_SECRET:-change_me_very_secret_key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN:    ${CORS_ORIGIN:-*}
      SMTP_HOST:      ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_USER:      ${SMTP_USER:-}
      SMTP_PASS:      ${SMTP_PASS:-}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost:8888}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nwg-internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Frontend (Nginx static) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nwg-frontend
    restart: unless-stopped
    networks:
      - nwg-internal

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.27-alpine
    container_name: nwg-nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - nwg-internal
      - nwg-external

volumes:
  mysql_data:
    driver: local

networks:
  nwg-internal:
    driver: bridge
    internal: true   # backend/mysql not reachable from outside, only through nginx
  nwg-external:
    driver: bridge
