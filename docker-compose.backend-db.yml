# =============================================================
# docker-compose.backend-db.yml — Backend and Database only
# Exposes backend API on port 3000.
# =============================================================

services:
  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: nwg-mysql-standalone
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE:      ${DB_NAME:-nepali_word_game}
      MYSQL_USER:          ${DB_USER:-nwg_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-nwg_pass}
    volumes:
      - mysql_data_standalone:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Node.js Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nwg-backend-standalone
    restart: unless-stopped
    ports:
      - "3000:3000"  # Expose backend API on port 3000
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PORT:           3000
      DB_HOST:        mysql
      DB_PORT:        3306
      DB_USER:        ${DB_USER:-nwg_user}
      DB_PASSWORD:    ${DB_PASSWORD:-nwg_pass}
      DB_NAME:        ${DB_NAME:-nepali_word_game}
      JWT_SECRET:     ${JWT_SECRET:-change_me_very_secret_key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN:    ${CORS_ORIGIN:-*}
      SMTP_HOST:      ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:      ${SMTP_PORT:-587}
      SMTP_USER:      ${SMTP_USER:-}
      SMTP_PASS:      ${SMTP_PASS:-}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost:8888}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql_data_standalone:
    driver: local
