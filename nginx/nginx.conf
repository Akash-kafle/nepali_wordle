# =============================================================
# Nginx Reverse Proxy Config
# Routes: /api/* → backend:3000,  /* → frontend:80
# =============================================================

upstream backend {
    server backend:3000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ---- API routes → backend ----
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Stricter rate limiting on auth endpoints
    location ~ ^/api/auth/(register|login)$ {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Static frontend ----
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Revalidate CSS/JS every time (no-cache + ETags)
        location ~* \.(css|js)$ {
            proxy_pass       http://frontend;
            add_header Cache-Control "no-cache, public, must-revalidate";
        }

        # Cache media and fonts longer
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass       http://frontend;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, must-revalidate";
        }
    }

    # Health check for load balancers
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
