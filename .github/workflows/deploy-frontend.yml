name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject API URL
        env:
          API_BASE: ${{ vars.API_BASE }}
        run: |
          # Fallback URL if API_BASE is not configured in GitHub variables yet
          API_URL="${API_BASE:-https://YOUR-RAILWAY-BACKEND-URL.up.railway.app/api}"
          echo "Injecting API URL: $API_URL"
          sed -i "s|__API_BASE__|$API_URL|g" frontend/config.js

      - name: Upload frontend folder as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
